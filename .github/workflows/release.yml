name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v6.5.0
        with:
          go-version: "1.23"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          LDFLAGS="-s -w"
          TARGETS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for target in "${TARGETS[@]}"; do
            os="${target%%/*}"
            arch="${target##*/}"
            output="cost-board-${os}-${arch}"
            if [ "$os" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building $output..."
            GOOS="$os" GOARCH="$arch" go build -ldflags="$LDFLAGS" -o "$output" .
          done

      - name: Create checksums
        run: |
          sha256sum cost-board-* > checksums.txt

      - uses: softprops/action-gh-release@v3.0.1
        with:
          files: |
            cost-board-*
            checksums.txt
          generate_release_notes: true

  docker:
    needs: release
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Check Docker Hub secrets
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN must be set to publish the Docker image."
            exit 1
          fi

      - uses: actions/checkout@v7.0.0

      - uses: docker/setup-buildx-action@v4.1.0

      - uses: docker/login-action@v4.2.0
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v6.1.0
        id: meta
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/cost-board
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
